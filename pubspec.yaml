name: yapay_zeka_botu
description: Yapay Zeka Derin Araştırma ve Sohbet Botu - Android Uygulaması
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter  
  
  # HTTP ve API iletişimi
  http: ^1.1.0
  dio: ^5.3.0  
  
  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0  
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  lottie: ^2.7.0  
  
  # Veri Saklama
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2  
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.1.0  
  
  # WebSocket & Real-time
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter  
  
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true  
  
  assets:
    - assets/images/
    - assets/animations/
  
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
    
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans-Regular.ttf
        - asset: assets/fonts/IBMPlexSans-Bold.ttf
          weight: 700
